name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: foundation-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Validate utility registry
        run: npm run registry:validate
      - name: Validate repository knowledge layer
        run: npm run knowledge:validate
      - name: Validate analytics, experiment and monetisation architecture
        run: npm run architecture:validate
      - name: Validate release contracts and evidence
        run: npm run validate:release
      - name: Scan tracked files for secrets
        run: npm run security:scan
      - name: Enforce high and critical dependency audit
        run: npm run security:audit
      - name: Run unit tests
        run: npm run test
      - name: Build
        run: npm run build

  end-to-end:
    name: End-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Validate brand assets
        run: npm run brand:validate
      - name: Validate favicon assets
        run: npm run brand:favicon:validate
      - name: Validate application icon assets
        run: npm run brand:application-icons:validate
      - name: Run end-to-end tests
        run: npm run test:e2e
      - name: Upload failed Playwright evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 14
