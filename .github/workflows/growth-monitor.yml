name: Growth monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    name: Growth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version-file: .nvmrc
      - name: Run direct Growth Foundation smoke
        run: node scripts/smoke-growth.mjs
